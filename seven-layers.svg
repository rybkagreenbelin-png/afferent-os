<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" font-family="DejaVu Sans, Liberation Sans, Arial, sans-serif">
  <rect x="0" y="0" width="920" height="660" rx="10" fill="#10141D"/>

  <!-- Header -->
  <text x="60" y="52" fill="#8A93A6" font-size="15" letter-spacing="4">THE AFFERENT OPERATING ENVIRONMENT</text>
  <text x="60" y="74" fill="#5B6376" font-size="12" letter-spacing="1">seven layers · concept v0.3</text>
  <line x1="60" y1="88" x2="860" y2="88" stroke="#2A3040" stroke-width="1"/>

  <!-- Layer 7 (top, original contribution: amber) -->
  <g>
    <rect x="60" y="108" width="540" height="56" rx="6" fill="#161B27" stroke="#E39A5C" stroke-width="1.6"/>
    <rect x="74" y="122" width="28" height="28" rx="5" fill="none" stroke="#E39A5C" stroke-width="1.4"/>
    <text x="88" y="141" fill="#E39A5C" font-size="14" font-weight="bold" text-anchor="middle">7</text>
    <text x="116" y="131" fill="#E6EAF2" font-size="16" font-weight="bold">Scene ontology</text>
    <text x="116" y="151" fill="#8A93A6" font-size="11.5">one state, two renderers: pixels for the human, a stream for the model</text>
  </g>

  <!-- Layer 6 -->
  <g>
    <rect x="60" y="176" width="540" height="56" rx="6" fill="#161B27" stroke="#3C455B" stroke-width="1.4"/>
    <rect x="74" y="190" width="28" height="28" rx="5" fill="none" stroke="#55607A" stroke-width="1.3"/>
    <text x="88" y="209" fill="#9AA3B5" font-size="14" font-weight="bold" text-anchor="middle">6</text>
    <text x="116" y="199" fill="#E6EAF2" font-size="16" font-weight="bold">Migration</text>
    <text x="116" y="219" fill="#8A93A6" font-size="11.5">legacy through embassies, not through parity; two classes of citizenship</text>
  </g>

  <!-- Layer 5 -->
  <g>
    <rect x="60" y="244" width="540" height="56" rx="6" fill="#161B27" stroke="#3C455B" stroke-width="1.4"/>
    <rect x="74" y="258" width="28" height="28" rx="5" fill="none" stroke="#55607A" stroke-width="1.3"/>
    <text x="88" y="277" fill="#9AA3B5" font-size="14" font-weight="bold" text-anchor="middle">5</text>
    <text x="116" y="267" fill="#E6EAF2" font-size="16" font-weight="bold">Learning loop</text>
    <text x="116" y="287" fill="#8A93A6" font-size="11.5">shadow mode for the desktop; the label is born together with the event</text>
  </g>

  <!-- Layer 4 -->
  <g>
    <rect x="60" y="312" width="540" height="56" rx="6" fill="#161B27" stroke="#3C455B" stroke-width="1.4"/>
    <rect x="74" y="326" width="28" height="28" rx="5" fill="none" stroke="#55607A" stroke-width="1.3"/>
    <text x="88" y="345" fill="#9AA3B5" font-size="14" font-weight="bold" text-anchor="middle">4</text>
    <text x="116" y="335" fill="#E6EAF2" font-size="16" font-weight="bold">Afferent perception</text>
    <text x="116" y="355" fill="#8A93A6" font-size="11.5">an event bus instead of vision; a thalamus and a spinal cord on local hardware</text>
  </g>

  <!-- Layer 3 -->
  <g>
    <rect x="60" y="380" width="540" height="56" rx="6" fill="#161B27" stroke="#3C455B" stroke-width="1.4"/>
    <rect x="74" y="394" width="28" height="28" rx="5" fill="none" stroke="#55607A" stroke-width="1.3"/>
    <text x="88" y="413" fill="#9AA3B5" font-size="14" font-weight="bold" text-anchor="middle">3</text>
    <text x="116" y="403" fill="#E6EAF2" font-size="16" font-weight="bold">Inversion of control</text>
    <text x="116" y="423" fill="#8A93A6" font-size="11.5">the model is the kernel; a tiny deterministic brainstem underneath</text>
  </g>

  <!-- Layer 2 -->
  <g>
    <rect x="60" y="448" width="540" height="56" rx="6" fill="#161B27" stroke="#3C455B" stroke-width="1.4"/>
    <rect x="74" y="462" width="28" height="28" rx="5" fill="none" stroke="#55607A" stroke-width="1.3"/>
    <text x="88" y="481" fill="#9AA3B5" font-size="14" font-weight="bold" text-anchor="middle">2</text>
    <text x="116" y="471" fill="#E6EAF2" font-size="16" font-weight="bold">Agent runtime &amp; supervision</text>
    <text x="116" y="491" fill="#8A93A6" font-size="11.5">organs, not tools; protocols at the border of the body; discrete decision points</text>
  </g>

  <!-- Layer 1 -->
  <g>
    <rect x="60" y="516" width="540" height="56" rx="6" fill="#161B27" stroke="#3C455B" stroke-width="1.4"/>
    <rect x="74" y="530" width="28" height="28" rx="5" fill="none" stroke="#55607A" stroke-width="1.3"/>
    <text x="88" y="549" fill="#9AA3B5" font-size="14" font-weight="bold" text-anchor="middle">1</text>
    <text x="116" y="539" fill="#E6EAF2" font-size="16" font-weight="bold">Authority</text>
    <text x="116" y="559" fill="#8A93A6" font-size="11.5">capabilities, not ambient authority; anything irreversible requires a human key</text>
  </g>

  <!-- Right annotations -->
  <!-- Layer 7 note -->
  <line x1="600" y1="136" x2="640" y2="136" stroke="#E39A5C" stroke-width="1.2" stroke-dasharray="3,4"/>
  <text x="648" y="132" fill="#E39A5C" font-size="12">the original contribution:</text>
  <text x="648" y="148" fill="#8A93A6" font-size="11.5">exists nowhere, even in fragments</text>

  <!-- Brain brace over layers 3-4 -->
  <path d="M 622 314 L 634 314 L 634 434 L 622 434" fill="none" stroke="#55607A" stroke-width="1.2" stroke-dasharray="4,4"/>
  <circle cx="634" cy="374" r="3" fill="#E39A5C"/>
  <text x="650" y="356" fill="#E6EAF2" font-size="13" font-weight="bold">the brain</text>
  <text x="650" y="374" fill="#8A93A6" font-size="11.5">a persistent, continuously</text>
  <text x="650" y="390" fill="#8A93A6" font-size="11.5">learning model — cross-cutting</text>
  <text x="650" y="406" fill="#8A93A6" font-size="11.5">research dependency</text>
  <text x="650" y="426" fill="#E39A5C" font-size="12">→ Molecular AI programme (§7)</text>

  <!-- Body boundary note near layers 1-2 -->
  <line x1="600" y1="490" x2="640" y2="490" stroke="#55607A" stroke-width="1.2" stroke-dasharray="3,4"/>
  <text x="648" y="486" fill="#8A93A6" font-size="11.5">inside the body: the scene</text>
  <text x="648" y="502" fill="#8A93A6" font-size="11.5">at the border: embassy protocols</text>

  <!-- Footer motto -->
  <text x="460" y="622" fill="#6B7488" font-size="13" font-style="italic" text-anchor="middle">“Systems that have bodies do not choose RPC.”</text>
</svg>
